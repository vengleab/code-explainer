<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>code-explainer</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #1e1e2e;
    color: #cdd6f4;
    font-family: ui-monospace, "Roboto Mono", Menlo, Consolas, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }
  h1 { font-size: 18px; color: #89b4fa; margin: 0 0 4px; }
  p.sub { color: #7f849c; font-size: 13px; margin: 0 0 24px; }
  .layout {
    width: 100%;
    max-width: 960px;
    display: grid;
    gap: 16px;
  }
  .code-wrap { position: relative; width: 100%; }
  .code-wrap pre,
  .code-wrap textarea {
    margin: 0;
    width: 100%;
    min-height: 220px;
    padding: 12px 14px;
    font: inherit;
    font-size: 14px;
    line-height: 1.5;
    border-radius: 8px;
    border: 1px solid #45475a;
    white-space: pre-wrap;
    word-wrap: break-word;
    box-sizing: border-box;
  }
  #highlight {
    position: absolute;
    inset: 0;
    color: #cdd6f4;
    background: #282838;
    pointer-events: none;
    overflow: hidden;
  }
  #highlight code { font: inherit; }
  textarea#code {
    position: relative;
    background: transparent;
    color: transparent;
    caret-color: #cdd6f4;
    resize: vertical;
    overflow: auto;
  }
  textarea#code:focus { outline: none; border-color: #89b4fa; }
  .tok-kw { color: #cba6f7; }
  .tok-str { color: #a6e3a1; }
  .tok-num { color: #fab387; }
  .tok-com { color: #6c7086; font-style: italic; }
  .tok-def { color: #89b4fa; }
  .tok-builtin { color: #f9e2af; }
  .tok-dec { color: #f5c2e7; }
  .mode-toggle {
    display: inline-flex;
    background: #313244;
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
    margin-bottom: 18px;
  }
  .mode-toggle button {
    background: transparent;
    color: #a6adc8;
    border: none;
    border-radius: 6px;
    padding: 7px 20px;
    font: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .mode-toggle button:hover { color: #cdd6f4; }
  .mode-toggle button.active {
    background: #89b4fa;
    color: #1e1e2e;
  }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  label.ms { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #a6adc8; }
  button {
    background: #89b4fa;
    color: #1e1e2e;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  button:not(:disabled):hover { background: #a6c8ff; }
  .secondary {
    display: inline-block;
    background: #313244;
    color: #cdd6f4;
    text-decoration: none;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  .secondary:not(:disabled):hover { background: #45475a; }
  #status { font-size: 13px; color: #f38ba8; min-height: 18px; }
  #status.ok { color: #a6e3a1; }
  #result { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #result img { max-width: 100%; border-radius: 10px; border: 1px solid #45475a; }
  .hint { font-size: 12px; color: #6c7086; }
</style>
</head>
<body>
  <h1>code-explainer</h1>
  <p class="sub" id="subtitle">paste a small Python snippet — get back an execution GIF (code, variables, output, step by step)</p>

  <div class="mode-toggle" id="mode-toggle">
    <button class="active" data-mode="python">Python</button>
    <button data-mode="pandas">Pandas</button>
  </div>

  <div class="layout">
    <div class="code-wrap">
      <pre id="highlight" aria-hidden="true"><code id="highlight-code"></code></pre>
      <textarea id="code" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off">fruits = ['apple', 'banana', 'cherry']

for fruit in fruits:
    print("-------------------")
    print(fruit)</textarea>
    </div>

    <div class="row">
      <button id="run">Generate GIF</button>
      <label class="ms">
        ms/frame
        <input id="ms" type="number" min="200" max="2000" step="50" value="900" style="width:70px" />
      </label>
      <span class="hint" id="hint">only a small set of stdlib imports is allowed (math, random, itertools, …) — no file/network/process access</span>
    </div>

    <div id="status"></div>
    <div id="result"></div>
  </div>

<script>
  function frameToPngBlob(imgEl) {
    return new Promise((resolve, reject) => {
      const canvas = document.createElement('canvas');
      canvas.width = imgEl.naturalWidth;
      canvas.height = imgEl.naturalHeight;
      canvas.getContext('2d').drawImage(imgEl, 0, 0);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('canvas export failed')), 'image/png');
    });
  }

  function codeToB64Url(str) {
    const bytes = new TextEncoder().encode(str);
    let bin = '';
    for (const b of bytes) bin += String.fromCharCode(b);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  // Google Slides (and most rich-text apps) flatten pasted image data to a
  // static frame; they only keep GIF animation when they fetch the file from
  // a URL themselves. So for Slides we copy a URL to this site's GET endpoint
  // and the user pastes it via Insert → Image → By URL.
  async function copySlidesUrl(code, ms, btn, endpoint) {
    endpoint = endpoint || '/api/generate';
    const url = `${location.origin}${endpoint}?c=${codeToB64Url(code)}&ms=${ms}`;
    btn.disabled = true;
    try {
      await navigator.clipboard.writeText(url);
      statusEl.className = 'ok';
      statusEl.textContent = 'URL copied — in Google Slides: Insert → Image → By URL, then paste (animation is kept)';
    } catch (e) {
      statusEl.className = '';
      statusEl.textContent = 'copy failed: ' + e;
    } finally {
      btn.disabled = false;
    }
  }

  async function copyGif(gifBlob, imgEl, btn) {
    if (!navigator.clipboard || !window.ClipboardItem) {
      statusEl.className = '';
      statusEl.textContent = 'clipboard copy is not supported in this browser';
      return;
    }
    btn.disabled = true;
    try {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/gif': gifBlob })]);
        statusEl.className = 'ok';
        statusEl.textContent = 'GIF copied to clipboard';
      } catch {
        // Only image/png is a universally-supported clipboard image type;
        // fall back to the currently displayed frame as a static image.
        const pngBlob = await frameToPngBlob(imgEl);
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': pngBlob })]);
        statusEl.className = 'ok';
        statusEl.textContent = "this browser doesn't support copying animated GIFs — copied the current frame as a PNG instead";
      }
    } catch (e) {
      statusEl.className = '';
      statusEl.textContent = 'copy failed: ' + e;
    } finally {
      btn.disabled = false;
    }
  }

  // ── Mode toggle ────────────────────────────────────────────────────────
  let currentMode = 'python';
  const DEFAULTS = {
    python: {
      code: `fruits = ['apple', 'banana', 'cherry']\n\nfor fruit in fruits:\n    print("-------------------")\n    print(fruit)`,
      subtitle: 'paste a small Python snippet — get back an execution GIF (code, variables, output, step by step)',
      hint: 'only a small set of stdlib imports is allowed (math, random, itertools, …) — no file/network/process access',
      endpoint: '/api/generate',
      ms: 900,
    },
    pandas: {
      code: `import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Ann', 'Bo', 'Cy', 'Di'],\n    'dept': ['eng', 'eng', 'sales', 'sales'],\n    'salary': [90, 60, 50, 55],\n})\ndf['bonus'] = df['salary'] * 0.1\nhigh = df[df['salary'] > 55]`,
      subtitle: 'paste pandas code — get back a step-by-step GIF with real DataFrame tables and diff highlighting',
      hint: 'pandas + numpy are available — stdlib imports allowed too — no file/network/process access',
      endpoint: '/api/generate-pandas',
      ms: 1100,
    },
  };

  const modeToggle = document.getElementById('mode-toggle');
  const subtitleEl = document.getElementById('subtitle');
  const hintEl = document.getElementById('hint');
  const runBtn = document.getElementById('run');
  const codeEl = document.getElementById('code');
  const msEl = document.getElementById('ms');
  const statusEl = document.getElementById('status');

  modeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn || btn.dataset.mode === currentMode) return;
    currentMode = btn.dataset.mode;
    modeToggle.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
    const d = DEFAULTS[currentMode];
    codeEl.value = d.code;
    msEl.value = d.ms;
    subtitleEl.textContent = d.subtitle;
    hintEl.textContent = d.hint;
    updateHighlight();
    resultEl.innerHTML = '';
    statusEl.textContent = '';
  });
  const resultEl = document.getElementById('result');
  const highlightPre = document.getElementById('highlight');
  const highlightCode = document.getElementById('highlight-code');

  // ── Syntax highlighting (small regex tokenizer, Python-only) ───────────
  const PY_KEYWORDS = new Set(['False','None','True','and','as','assert','async','await',
    'break','class','continue','def','del','elif','else','except','finally','for','from',
    'global','if','import','in','is','lambda','nonlocal','not','or','pass','raise','return',
    'try','while','with','yield']);
  const PY_BUILTINS = new Set(['print','len','range','int','str','float','list','dict','set',
    'tuple','bool','abs','all','any','enumerate','zip','map','filter','sorted','reversed',
    'sum','min','max','open','input','isinstance','type','super','self']);
  const TOKEN_RE = /(#.*)|('''[\s\S]*?'''|"""[\s\S]*?"""|'(?:[^'\\\n]|\\.)*'|"(?:[^"\\\n]|\\.)*")|(\b\d+\.?\d*\b)|(@[A-Za-z_]\w*)|([A-Za-z_]\w*)/g;

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function highlightPython(code) {
    let out = '', last = 0, prevWord = '', m;
    TOKEN_RE.lastIndex = 0;
    while ((m = TOKEN_RE.exec(code))) {
      out += escapeHtml(code.slice(last, m.index));
      const [, comment, string, number, decorator, ident] = m;
      if (comment) out += `<span class="tok-com">${escapeHtml(comment)}</span>`;
      else if (string) out += `<span class="tok-str">${escapeHtml(string)}</span>`;
      else if (number) out += `<span class="tok-num">${number}</span>`;
      else if (decorator) out += `<span class="tok-dec">${escapeHtml(decorator)}</span>`;
      else if (ident) {
        if (PY_KEYWORDS.has(ident)) out += `<span class="tok-kw">${ident}</span>`;
        else if (prevWord === 'def' || prevWord === 'class') out += `<span class="tok-def">${ident}</span>`;
        else if (PY_BUILTINS.has(ident)) out += `<span class="tok-builtin">${ident}</span>`;
        else out += ident;
        prevWord = ident;
      }
      last = TOKEN_RE.lastIndex;
    }
    out += escapeHtml(code.slice(last));
    return out;
  }

  function updateHighlight() {
    highlightCode.innerHTML = highlightPython(codeEl.value) + '\n';
  }

  function syncScroll() {
    highlightPre.scrollTop = codeEl.scrollTop;
    highlightPre.scrollLeft = codeEl.scrollLeft;
  }

  codeEl.addEventListener('input', updateHighlight);
  codeEl.addEventListener('scroll', syncScroll);
  updateHighlight();

  // ── Tab / Shift+Tab indent handling ─────────────────────────────────────
  const TAB = '    ';

  codeEl.addEventListener('keydown', (e) => {
    if (e.key !== 'Tab') return;
    e.preventDefault();

    const value = codeEl.value;
    const start = codeEl.selectionStart;
    const end = codeEl.selectionEnd;

    if (start === end && !e.shiftKey) {
      codeEl.setRangeText(TAB, start, end, 'end');
      updateHighlight();
      return;
    }

    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    let lineEnd = end > start && value[end - 1] === '\n' ? end - 1 : value.indexOf('\n', end);
    if (lineEnd === -1) lineEnd = value.length;

    const block = value.slice(lineStart, lineEnd);
    const lines = block.split('\n');

    if (e.shiftKey) {
      let firstDelta = 0;
      const newLines = lines.map((line, i) => {
        let removed = 0;
        if (line.startsWith(TAB)) removed = TAB.length;
        else if (line.startsWith('\t')) removed = 1;
        else {
          const m = line.match(/^ {1,3}/);
          if (m) removed = m[0].length;
        }
        if (i === 0) firstDelta = -removed;
        return line.slice(removed);
      });
      const newBlock = newLines.join('\n');
      codeEl.setRangeText(newBlock, lineStart, lineEnd, 'select');
      codeEl.selectionStart = Math.max(lineStart, start + firstDelta);
      codeEl.selectionEnd = end + (newBlock.length - block.length);
    } else {
      const newBlock = lines.map(line => TAB + line).join('\n');
      codeEl.setRangeText(newBlock, lineStart, lineEnd, 'select');
      codeEl.selectionStart = start + TAB.length;
      codeEl.selectionEnd = end + (newBlock.length - block.length);
    }

    updateHighlight();
  });

  runBtn.addEventListener('click', async () => {
    const code = codeEl.value;
    const ms = parseInt(msEl.value, 10) || DEFAULTS[currentMode].ms;
    const endpoint = DEFAULTS[currentMode].endpoint;

    runBtn.disabled = true;
    statusEl.className = '';
    statusEl.textContent = 'running…';
    resultEl.innerHTML = '';

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, ms }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'unknown error' }));
        statusEl.className = '';
        statusEl.textContent = err.error || `request failed (${res.status})`;
        return;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const img = document.createElement('img');
      img.src = url;
      resultEl.appendChild(img);

      const btnRow = document.createElement('div');
      btnRow.className = 'row';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'secondary';
      copyBtn.textContent = 'Copy GIF';
      copyBtn.addEventListener('click', () => copyGif(blob, img, copyBtn));
      btnRow.appendChild(copyBtn);

      const downloadBtn = document.createElement('a');
      downloadBtn.className = 'secondary';
      downloadBtn.textContent = 'Download GIF';
      downloadBtn.href = url;
      downloadBtn.download = 'code-explainer.gif';
      btnRow.appendChild(downloadBtn);

      const slidesBtn = document.createElement('button');
      slidesBtn.className = 'secondary';
      slidesBtn.textContent = 'Copy URL for Google Slides';
      slidesBtn.addEventListener('click', () => copySlidesUrl(code, ms, slidesBtn, endpoint));
      btnRow.appendChild(slidesBtn);

      resultEl.appendChild(btnRow);

      statusEl.className = 'ok';
      statusEl.textContent = 'done';
    } catch (e) {
      statusEl.textContent = String(e);
    } finally {
      runBtn.disabled = false;
    }
  });
</script>
</body>
</html>
